<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Service - YOUtility</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo"><img src="photos/Vibrant logo for YOUtility Marketplace.png" alt="YOUtility logo" class="site-logo"><span>YOUtility</span></div>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="providers.html">Providers</a></li>
                <li><a href="history.html">My Bookings</a></li>
                <li><a href="login.html">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <button class="back-button" onclick="goBack()"><span class="back-arrow">←</span> Back</button>
        <section class="booking-section">
            <h1>Book Your Service</h1>
            <div class="booking-form-container">
                <form id="bookingForm">
                    <div class="form-section">
                        <h2>Service Details</h2>
                        <div class="form-group">
                            <label for="service-type">Service Type</label>
                            <select id="service-type" required>
                                <option value="">Select Service</option>
                                <option value="electrician">Electrician</option>
                                <option value="plumber">Plumber</option>
                                <option value="carpenter">Carpenter</option>
                                <option value="mechanic">Car Mechanic</option>
                                <option value="painter">Painter</option>
                                <option value="barber">Barber</option>
                                <option value="chef">Chef</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="service-description">Service Description</label>
                            <textarea id="service-description" rows="4" placeholder="Describe the service you need..." required></textarea>
                        </div>
                    </div>

                    <div class="form-section">
                        <h2>Schedule</h2>
                        <div class="form-group">
                            <label for="preferred-date">Preferred Date</label>
                            <input type="date" id="preferred-date" required>
                        </div>
                        <div class="form-group">
                            <label for="preferred-time">Preferred Time</label>
                            <select id="preferred-time" required>
                                <option value="">Select Time</option>
                                <option value="morning">Morning (8AM - 12PM)</option>
                                <option value="afternoon">Afternoon (12PM - 5PM)</option>
                                <option value="evening">Evening (5PM - 8PM)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="duration">Estimated Duration</label>
                            <select id="duration" required>
                                <option value="">Select Duration</option>
                                <option value="1">1 hour</option>
                                <option value="2">2 hours</option>
                                <option value="3">3 hours</option>
                                <option value="4">4 hours</option>
                                <option value="5">5+ hours</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-section">
                        <h2>Location</h2>
                        <div class="form-group">
                            <label for="address">Address</label>
                            <input type="text" id="address" placeholder="Street address" required>
                        </div>
                        <div class="form-group">
                            <label for="city">City</label>
                            <input type="text" id="city" required>
                        </div>
                        <div class="form-group">
                            <label for="zipcode">ZIP Code</label>
                            <input type="text" id="zipcode" required>
                        </div>
                    </div>

                    <div class="form-section">
                        <h2>Contact Information</h2>
                        <div class="form-group">
                            <label for="contact-name">Full Name</label>
                            <input type="text" id="contact-name" required>
                        </div>
                        <div class="form-group">
                            <label for="contact-phone">Phone Number</label>
                            <input type="tel" id="contact-phone" required>
                        </div>
                        <div class="form-group">
                            <label for="contact-email">Email</label>
                            <input type="email" id="contact-email" required>
                        </div>
                    </div>

                    <div class="form-section">
                        <h2>Additional Information</h2>
                        <div class="form-group">
                            <label for="special-requests">Special Requests or Notes</label>
                            <textarea id="special-requests" rows="3" placeholder="Any special instructions or requirements..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="terms-agree">
                                I agree to the <a href="#" target="_blank">Terms of Service</a> and <a href="#" target="_blank">Privacy Policy</a>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="submit-booking-btn">Proceed to Payment</button>
                </form>
            </div>

            <!-- Provider Information Section (shown after successful booking) -->
            <div id="provider-info-section" class="provider-info-container" style="display: none;">
                <h2>Service Provider Information</h2>
                <div id="provider-details" class="provider-details-card">
                    <!-- Provider details will be populated by JavaScript -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 YOUtility. All rights reserved.</p>
    </footer>

    <!-- Modal for messaging -->
    <div id="messaging-modal" class="modal">
        <div class="modal-content messaging-modal-content">
            <span class="close-modal">&times;</span>
            <div id="messaging-body">
                <!-- Messaging content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="messaging.js"></script>
    <script src="booking.js"></script>
</body>
</html>
