<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Review - YOUtility</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo"><img src="photos/Vibrant logo for YOUtility Marketplace.png" alt="YOUtility logo" class="site-logo"><span>YOUtility</span></div>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="providers.html">Providers</a></li>
                <li><a href="history.html">My Bookings</a></li>
                <li><a href="login.html">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="review-section">
            <h1>Write a Review</h1>
            <div class="review-container">
                <div class="booking-info" id="booking-info">
                    <!-- Booking info will be populated by JavaScript -->
                </div>

                <form id="reviewForm">
                    <div class="form-group">
                        <label>Overall Rating</label>
                        <div class="rating-stars">
                            <input type="radio" id="star5" name="rating" value="5">
                            <label for="star5">★</label>
                            <input type="radio" id="star4" name="rating" value="4">
                            <label for="star4">★</label>
                            <input type="radio" id="star3" name="rating" value="3">
                            <label for="star3">★</label>
                            <input type="radio" id="star2" name="rating" value="2">
                            <label for="star2">★</label>
                            <input type="radio" id="star1" name="rating" value="1">
                            <label for="star1">★</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="review-title">Review Title</label>
                        <input type="text" id="review-title" placeholder="Summarize your experience" required>
                    </div>

                    <div class="form-group">
                        <label for="review-comment">Your Review</label>
                        <textarea id="review-comment" rows="6" placeholder="Tell others about your experience with this service..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Would you recommend this service?</label>
                        <div class="recommend-options">
                            <label>
                                <input type="radio" name="recommend" value="yes" required>
                                Yes, definitely
                            </label>
                            <label>
                                <input type="radio" name="recommend" value="maybe">
                                Maybe
                            </label>
                            <label>
                                <input type="radio" name="recommend" value="no">
                                No
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="submit-review-btn">Submit Review</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 YOUtility. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script src="review.js"></script>
</body>
</html>
