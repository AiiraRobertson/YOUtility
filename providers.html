<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Providers - YOUtility</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo"><img src="photos/Vibrant logo for YOUtility Marketplace.png" alt="YOUtility logo" class="site-logo"><span>YOUtility</span></div>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="providers.html">Find Work</a></li>
                <li><a href="provider-dashboard.html">Dashboard</a></li>
                <li><a href="profile.html">My Profile</a></li>
                <li><a href="login.html">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <button class="back-button" onclick="goBack()"><span class="back-arrow">←</span> Back</button>
        <section class="providers-section">
            <h1>Service Providers</h1>
            <div class="filters">
                <input type="text" id="search-input" placeholder="Search by name, service, or location...">
                <select id="service-filter">
                    <option value="">All Services</option>
                </select>
                <input type="text" id="location-filter" placeholder="Enter location...">
                <button id="search-btn">Search</button>
            </div>
            <div class="providers-grid" id="providers-container">
                <!-- Providers will be populated by JavaScript -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 YOUtility. All rights reserved.</p>
    </footer>

    <!-- Modal for messaging -->
    <div id="messaging-modal" class="modal">
        <div class="modal-content messaging-modal-content">
            <span class="close-modal">&times;</span>
            <div id="messaging-body">
                <!-- Messaging content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="messaging.js"></script>
    <script src="providers.js"></script>
</body>
</html>
