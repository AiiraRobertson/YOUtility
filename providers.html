<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Providers - YOUtility</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">YOUtility</div>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="providers.html">Find Work</a></li>
                <li><a href="provider-dashboard.html">Dashboard</a></li>
                <li><a href="profile.html">My Profile</a></li>
                <li><a href="login.html">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="providers-section">
            <h1>Service Providers</h1>
            <div class="filters">
                <select id="service-filter">
                    <option value="">All Services</option>
                    <option value="electrician">Electricians</option>
                    <option value="plumber">Plumbers</option>
                    <option value="carpenter">Carpenters</option>
                    <option value="mechanic">Car Mechanics</option>
                    <option value="painter">Painters</option>
                    <option value="barber">Barbers</option>
                    <option value="chef">Chefs</option>
                    <option value="other">Other</option>
                </select>
                <input type="text" id="location-filter" placeholder="Enter location...">
                <button id="search-btn">Search</button>
            </div>
            <div class="providers-grid" id="providers-container">
                <!-- Providers will be populated by JavaScript -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 YOUtility. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script src="providers.js"></script>
</body>
</html>
