<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - YOUtility</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">YOUtility</div>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="providers.html">Providers</a></li>
                <li><a href="history.html">My Bookings</a></li>
                <li><a href="login.html">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="payment-section">
            <h1>Complete Your Payment</h1>
            <div class="payment-container">
                <div class="booking-summary">
                    <h2>Booking Summary</h2>
                    <div id="booking-summary-content">
                        <!-- Booking summary will be populated by JavaScript -->
                    </div>
                </div>

                <div class="payment-form">
                    <h2>Payment Information</h2>
                    <form id="paymentForm">
                        <div class="form-section">
                            <h3>Card Information</h3>
                            <div class="form-group">
                                <label for="card-number">Card Number</label>
                                <input type="text" id="card-number" placeholder="1234 5678 9012 3456" required>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="expiry-month">Expiry Month</label>
                                    <select id="expiry-month" required>
                                        <option value="">MM</option>
                                        <option value="01">01</option>
                                        <option value="02">02</option>
                                        <option value="03">03</option>
                                        <option value="04">04</option>
                                        <option value="05">05</option>
                                        <option value="06">06</option>
                                        <option value="07">07</option>
                                        <option value="08">08</option>
                                        <option value="09">09</option>
                                        <option value="10">10</option>
                                        <option value="11">11</option>
                                        <option value="12">12</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="expiry-year">Expiry Year</label>
                                    <select id="expiry-year" required>
                                        <option value="">YYYY</option>
                                        <option value="2024">2024</option>
                                        <option value="2025">2025</option>
                                        <option value="2026">2026</option>
                                        <option value="2027">2027</option>
                                        <option value="2028">2028</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="cvv">CVV</label>
                                <input type="text" id="cvv" placeholder="123" required>
                            </div>
                        </div>

                        <div class="form-section">
                            <h3>Billing Information</h3>
                            <div class="form-group">
                                <label for="billing-name">Name on Card</label>
                                <input type="text" id="billing-name" required>
                            </div>
                            <div class="form-group">
                                <label for="billing-address">Billing Address</label>
                                <input type="text" id="billing-address" required>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="billing-city">City</label>
                                    <input type="text" id="billing-city" required>
                                </div>
                                <div class="form-group">
                                    <label for="billing-zip">ZIP Code</label>
                                    <input type="text" id="billing-zip" required>
                                </div>
                            </div>
                        </div>

                        <div class="payment-summary">
                            <div class="summary-row">
                                <span>Service Fee:</span>
                                <span id="service-fee">$0.00</span>
                            </div>
                            <div class="summary-row">
                                <span>Platform Fee:</span>
                                <span>$5.00</span>
                            </div>
                            <div class="summary-row total">
                                <span>Total:</span>
                                <span id="total-amount">$5.00</span>
                            </div>
                        </div>

                        <button type="submit" class="pay-now-btn">Pay Now</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 YOUtility. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script src="payment.js"></script>
</body>
</html>
